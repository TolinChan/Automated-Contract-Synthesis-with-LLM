hypotheses:
  - id: H1
    statement: "Iterative verifier-feedback (Baseline B, coding agent) achieves higher task pass rate than single-shot API (Baseline A, Pass@1) across all 6 tasks."
    prediction: "rounds_to_success pass rate > Pass@1 pass rate, especially on M1-M3."
    status: untested
  - id: H2
    statement: "Raw Move Prover fail.log (with Z3 counterexamples) is sufficient for LLMs to identify and fix the bug without a dedicated Error Translation layer."
    prediction: "T0/T1 repair succeeds without preprocessing; M1-M3 may fail due to verbose output."
    status: partially_supported_by_poc
  - id: H3
    statement: "Model capability (GPT-4o vs Claude Sonnet vs weaker models) matters more for complex tasks (M1-M3) than for simple tasks (T0-T2)."
    prediction: "T0-T2 Pass@1 rates converge across models; M1-M3 diverge."
    status: untested
  - id: H4
    statement: "Adding a Reflexion-style verbal reflection step between rounds reduces rounds_to_success on M1-M3 tasks."
    prediction: "Reflexion variant reaches success in fewer rounds on complex tasks."
    status: untested

